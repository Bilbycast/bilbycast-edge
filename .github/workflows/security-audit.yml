name: Security audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security-audit.yml"
      - "deny.toml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security-audit.yml"
      - "deny.toml"
  schedule:
    # Daily at 07:00 AEST (21:00 UTC) — catch new RUSTSEC advisories
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  checks: write

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned to the post-v2.0.0 commit that migrated from Node.js 20
      # (deprecated, removed from the runner in Sep 2026) to Node.js 24.
      # Upstream hasn't tagged a release since — bump to the next tag
      # when rustsec/audit-check cuts one.
      - uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      # bilbycast-edge/Cargo.toml has path dependencies on five sibling
      # repos (../bilbycast-fdk-aac-rs, ../bilbycast-ffmpeg-video-rs,
      # ../bilbycast-libsrt-rs, ../bilbycast-rist, ../bilbycast-bonding).
      # `cargo-deny` runs `cargo metadata`, which fails unless those
      # sibling directories exist. Mirror the nightly-release layout:
      # check everything out into peer directories of the workspace root,
      # then point cargo-deny at ./bilbycast-edge/Cargo.toml so the
      # relative `..` references resolve correctly.
      - name: Checkout bilbycast-libsrt-rs (path dependency)
        uses: actions/checkout@v6
        with:
          repository: Bilbycast/bilbycast-libsrt-rs
          path: bilbycast-libsrt-rs

      - name: Checkout bilbycast-fdk-aac-rs (path dependency)
        uses: actions/checkout@v6
        with:
          repository: Bilbycast/bilbycast-fdk-aac-rs
          path: bilbycast-fdk-aac-rs

      - name: Checkout bilbycast-ffmpeg-video-rs (path dependency)
        uses: actions/checkout@v6
        with:
          repository: Bilbycast/bilbycast-ffmpeg-video-rs
          path: bilbycast-ffmpeg-video-rs

      - name: Checkout bilbycast-rist (path dependency)
        uses: actions/checkout@v6
        with:
          repository: Bilbycast/bilbycast-rist
          path: bilbycast-rist

      - name: Checkout bilbycast-bonding (path dependency)
        uses: actions/checkout@v6
        with:
          repository: Bilbycast/bilbycast-bonding
          path: bilbycast-bonding

      - name: Checkout bilbycast-edge
        uses: actions/checkout@v6
        with:
          path: bilbycast-edge

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
          manifest-path: ./bilbycast-edge/Cargo.toml
