      - name: Prune old releases (keep latest 3)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo "${{ github.repository }}" --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | while read -r OLD_TAG; do
                [ -z "$OLD_TAG" ] && continue
                echo "Deleting old release ${OLD_TAG}"
                gh release delete "${OLD_TAG}" --repo "${{ github.repository }}" --cleanup-tag --yes
              done
