name: Release

# Two triggers, both converging on the same build + sign + publish job:
#   - `workflow_dispatch` (manual button in the GitHub Actions UI)
#   - `push.tags: v*` (used by the monorepo-root `release-all.sh`
#     orchestrator — this is the canonical release path)
#
# The schedule trigger was removed: cosign-keyless signing requires the
# Fulcio cert subject to match `refs/tags/v*` (enforced by
# `src/upgrade/trust.rs::ALLOWED_SIGNERS` on every deployed edge), and a
# `schedule` run from `main` produces a `refs/heads/main` cert that fails
# verification. `release-all.sh` pushes the tag and lets the `push.tags`
# trigger fire the workflow under the correct ref.
#
# Filename `nightly-release.yml` is preserved on disk because it is
# hard-coded into the Sigstore identity allowlist
# (`src/upgrade/trust.rs::ALLOWED_SIGNERS`) and the `cosign verify-blob`
# regex below — renaming would lock every deployed edge out of accepting
# future signed manifests.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # Required for Sigstore keyless signing — Fulcio mints a short-lived
  # cert against the workflow run's OIDC identity.
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release found for ${TAG}. Will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # ─── full variant: every video codec backend (AGPL + GPL bundle) ───
          # libx264 + libx265 + NVENC + NVDEC + VAAPI encoders/decoders —
          # plus QSV (encode + decode) on x86_64. aarch64 drops QSV
          # because Intel iGPU is x86_64-only, so it lists the cross-arch
          # features explicitly instead of the `video-encoders-full`
          # composite. VAAPI ships on both arches (Linux only; activates
          # at runtime on AMD Mesa radeonsi or Intel iHD hosts). `display`
          # is included on top of the codec bundle so the local-display
          # output spawner is compiled in. MXL compiled in with
          # `mxl-not-built` — Rust code ships, libmxl.so discovered at
          # runtime via dlopen. `sdi-decklink` ships on both arches — it is
          # an I/O type, not a codec backend, so it is listed here rather
          # than folded into the `video-encoders-full` composite. Its SDK
          # headers come from a private org repo (EULA-gated, not vendorable
          # here) and libDeckLinkAPI.so is dlopened at runtime, so a
          # host with no card / no Desktop Video simply fails the boot probe
          # and never advertises the capability.
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: x86_64-linux-full
            variant: full
            cargo_features: "video-encoders-full display mxl mxl-not-built sdi-decklink"
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: aarch64-linux-full
            variant: full
            cargo_features: "video-encoder-x264 video-encoder-x265 video-encoder-nvenc video-encoder-vaapi video-decoder-nvdec video-decoder-vaapi display mxl mxl-not-built sdi-decklink"
          # ─── Rockchip variant: aarch64 full bundle PLUS the RK3568/RK3588
          # RKMPP hardware H.264/HEVC encoder (h264_rkmpp / hevc_rkmpp, 8-bit
          # 4:2:0). Built NATIVELY on the same ubuntu-24.04-arm runner — no
          # Rockchip hardware is needed to compile: the FFmpeg rkmpp encoder
          # links against the userspace librockchip_mpp only; the VPU +
          # /dev/mpp_service are a RUNTIME dependency (see the RKMPP dep step).
          # Shipped as a SEPARATE artefact rather than folded into
          # `aarch64-linux-full` because (a) librockchip_mpp is a Rockchip-BSP
          # userspace lib absent from stock Ubuntu, so it must be materialised
          # onto the runner, and (b) it links DYNAMICALLY (unlike the static
          # x264/x265) — a generic aarch64 host without the BSP could not run a
          # binary carrying that NEEDED entry, so it must not contaminate the
          # generic aarch64-full build. NVENC / QSV / VAAPI are dropped: none
          # exist on Rockchip, and dropping VAAPI also sheds the libva.so
          # runtime NEEDED that a minimal RK3588 BSP rootfs usually lacks.
          # x264/x265 stay for the documented CPU fallback on 10-bit / 4:2:2
          # (rkmpp is 8-bit 4:2:0 only — see docs/codec-matrix.md). Suffix
          # `aarch64-linux-rockchip` → build-manifest.sh emits
          # (arch=aarch64-linux, variant=rockchip); an edge compiled with rkmpp
          # reports variant `rockchip` (src/upgrade/mod.rs::default_variant) so
          # ONLY real Rockchip nodes auto-select it while generic aarch64-full
          # nodes keep pulling `full`.
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: aarch64-linux-rockchip
            variant: full
            rkmpp: "true"
            cargo_features: "video-encoder-x264 video-encoder-x265 video-encoder-rkmpp display mxl mxl-not-built sdi-decklink"
    runs-on: ${{ matrix.runner }}
    steps:
      # Runs before any checkout / apt / x264-from-source / cargo, so a missing
      # token costs seconds instead of failing ~40 minutes in. SDI is in every
      # full artefact by policy: an absent SDK is a release-blocking
      # misconfiguration, never a reason to quietly publish a "full" binary that
      # lacks an I/O type operators expect.
      - name: Preflight - DeckLink SDK access
        if: matrix.variant == 'full'
        env:
          DECKLINK_SDK_TOKEN: ${{ secrets.DECKLINK_SDK_TOKEN }}
        run: |
          if [ -n "${DECKLINK_SDK_TOKEN}" ]; then
            echo "OK: DECKLINK_SDK_TOKEN is set - SDI (DeckLink) will be built into this artefact."
            exit 0
          fi
          cat >&2 <<'EOF'
          ======================================================================
          RELEASE BLOCKED - the DECKLINK_SDK_TOKEN repository secret is not set.
          ======================================================================

          Every `*-linux-full` artefact ships SDI (Blackmagic DeckLink) support.
          Building without it would publish a "full" binary silently missing an
          I/O type operators expect, so the build stops here instead of
          degrading quietly.

          WHY A TOKEN: the DeckLink SDK is EULA-gated and cannot live in this
          public repository. Only the SDK *headers* are needed to build -
          libDeckLinkAPI.so is dlopened at runtime by Desktop Video on the
          operator's host - but there is no header-free build path: the C++ shim
          #includes DeckLinkAPI.h and the SDK's own DeckLinkAPIDispatch.cpp is
          compiled in.

          ONE-TIME SETUP (do this once; every later release just works):

            1. Download the "Desktop Video SDK" from Blackmagic Design and
               accept the EULA:  https://www.blackmagicdesign.com/support/
            2. Create a PRIVATE repo Bilbycast/bilbycast-decklink-sdk and commit
               the SDK's `Linux/include` directory to it - the one holding BOTH
               DeckLinkAPI.h and DeckLinkAPIDispatch.cpp:
                 git init && cp -r /path/to/SDK/Linux/include . && git add -A
                 git commit -m "DeckLink SDK <version> headers" && git push
               Private, so nothing is redistributed. Tag it with the SDK version.
            3. Create a fine-grained PAT with Contents:Read on that repo only,
               and add it here as the DECKLINK_SDK_TOKEN secret
               (Settings -> Secrets and variables -> Actions).
            4. Re-run this workflow.

          To bump the SDK later, commit new headers to that repo. Nothing here
          changes.
          ======================================================================
          EOF
          exit 1

      - name: Checkout bilbycast-libsrt-rs (path dependency)
        uses: actions/checkout@v7
        with:
          repository: Bilbycast/bilbycast-libsrt-rs
          path: bilbycast-libsrt-rs
          submodules: recursive

      - name: Checkout bilbycast-fdk-aac-rs (path dependency)
        uses: actions/checkout@v7
        with:
          repository: Bilbycast/bilbycast-fdk-aac-rs
          path: bilbycast-fdk-aac-rs
          submodules: recursive

      - name: Checkout bilbycast-ffmpeg-video-rs (path dependency)
        # NOTE: the full-variant STATIC libx264/libx265 link lives in this
        # repo's libffmpeg-video-sys/build.rs. It's checked out at default-branch
        # HEAD (no pinned ref); if a tag is cut before that build.rs is merged
        # here, the build links DYNAMIC and the "Verify binary" ldd gate fails
        # the release (safe, but the failure reason is otherwise opaque).
        uses: actions/checkout@v7
        with:
          repository: Bilbycast/bilbycast-ffmpeg-video-rs
          path: bilbycast-ffmpeg-video-rs
          submodules: recursive
          fetch-depth: 0

      - name: Checkout bilbycast-rist (path dependency)
        uses: actions/checkout@v7
        with:
          repository: Bilbycast/bilbycast-rist
          path: bilbycast-rist
          submodules: recursive

      - name: Checkout bilbycast-bonding (path dependency)
        uses: actions/checkout@v7
        with:
          repository: Bilbycast/bilbycast-bonding
          path: bilbycast-bonding

      - name: Checkout bilbycast-mxl-rs (path dependency)
        uses: actions/checkout@v7
        with:
          repository: Bilbycast/bilbycast-mxl-rs
          path: bilbycast-mxl-rs
          submodules: recursive

      # Checked out unconditionally, not just for the SDI-bearing variants:
      # `decklink-rs` is a path dependency and therefore sits in Cargo.lock's
      # resolve graph even when `sdi-decklink` is off, so cargo fails at
      # manifest load if the directory is absent. Only the build.rs runs under
      # the feature; the checkout is cheap either way. Vendors no SDK - the
      # repo carries first-party shim sources only.
      - name: Checkout bilbycast-decklink-rs (path dependency)
        uses: actions/checkout@v7
        with:
          repository: Bilbycast/bilbycast-decklink-rs
          path: bilbycast-decklink-rs

      - name: Checkout bilbycast-edge
        uses: actions/checkout@v7
        with:
          path: bilbycast-edge

      - name: Install common build dependencies
        run: |
          # `display` Cargo feature link-time dep: libasound2-dev
          # (alsa-sys `links = "alsa"`). `drm-rs` is pure-Rust ioctls
          # over /dev/dri — no libdrm-dev needed. Connector enumeration
          # walks `/sys/class/drm` via std::fs, so libudev-dev isn't
          # in the link graph either.
          sudo apt-get update
          sudo apt-get install -y cmake make clang libclang-dev pkg-config libssl-dev g++ \
            libasound2-dev nasm

      # Materialises the EULA-gated DeckLink SDK headers that
      # The SDK headers live in a private org repo rather than a download URL:
      # same auth as every other sibling checkout, no expiring pre-signed URLs,
      # and an SDK bump is a commit there rather than a secret rotation here.
      # Private, so nothing is redistributed - build.rs only needs the headers;
      # libDeckLinkAPI.so is dlopened at runtime from Desktop Video.
      - name: Checkout DeckLink SDK headers (private)
        if: matrix.variant == 'full'
        uses: actions/checkout@v7
        with:
          repository: Bilbycast/bilbycast-decklink-sdk
          token: ${{ secrets.DECKLINK_SDK_TOKEN }}
          path: decklink-sdk

      - name: Locate DeckLink SDK headers
        if: matrix.variant == 'full'
        run: |
          # build.rs wants the directory holding BOTH files. Locate it rather
          # than assume a layout, so the private repo can keep the SDK's own
          # `Linux/include` nesting or flatten it, whichever suits.
          API_H="$(find decklink-sdk -type f -name DeckLinkAPI.h -print -quit)"
          if [ -z "${API_H}" ]; then
            echo "ERROR: no DeckLinkAPI.h in Bilbycast/bilbycast-decklink-sdk." >&2
            echo "  That repo must contain the SDK's Linux/include directory." >&2
            exit 1
          fi
          SDK_DIR="$(cd "$(dirname "${API_H}")" && pwd)"
          if [ ! -f "${SDK_DIR}/DeckLinkAPIDispatch.cpp" ]; then
            echo "ERROR: found DeckLinkAPI.h at ${API_H} but no DeckLinkAPIDispatch.cpp" >&2
            echo "  beside it. Both are required; commit the whole include dir." >&2
            exit 1
          fi
          echo "DeckLink SDK headers: ${SDK_DIR}"
          echo "DECKLINK_SDK_DIR=${SDK_DIR}" >> "$GITHUB_ENV"

      - name: Install video-encoder build dependencies
        if: matrix.variant == 'full'
        run: |
          # libx264 / libx265 are linked STATICALLY into the binary (see
          # libffmpeg-video-sys/build.rs) so the release artefact carries no
          # runtime DT_NEEDED on libx264.so.<build> / libx265.so.<build>. Those
          # SONAMEs *are* the upstream build number and bump on every distro
          # release (Ubuntu 24.04 ships libx264.so.164 / libx265.so.199; 26.04
          # ships .165 / .215, ABI-incompatible), so a dynamically-linked binary
          # only runs on the exact release it was built on. Static linking is
          # GPL-neutral — this is already an AGPL-3.0+/GPL-2.0+ combined work.
          #
          # x265: libx265-dev ships libx265.a (multilib 8/10/12-bit) which we
          # static-link directly. libnuma-dev satisfies x265's Libs.private
          # `-lnuma` at the final static link.
          sudo apt-get install -y libx265-dev libnuma-dev
          # x264: Debian/Ubuntu's libx264-dev ships only libx264.so (no .a), so
          # build a static libx264.a from source and link that.
          #
          # REPRODUCIBILITY / GPL: x264 publishes no version tags, only the
          # moving `stable` branch. For a fully byte-reproducible release you
          # should pin X264_REF to an immutable commit SHA (then clone + `git
          # checkout <sha>` since `--branch` only accepts refs/tags). Until
          # then, we clone `stable` and RECORD the exact resolved SHA into the
          # artefact (SOURCES-x264.txt, copied into the tarball by the Package
          # step) so the GPL §3 corresponding-source obligation for the bundled
          # libx264 is satisfiable for every published build.
          X264_REF="stable"
          X264_PREFIX="$HOME/x264-static"
          # Retry the clone — a single-host upstream failure shouldn't fail the
          # whole release build (fail-fast:false only isolates per-arch).
          for attempt in 1 2 3; do
            git clone --depth 1 --branch "${X264_REF}" \
              https://code.videolan.org/videolan/x264.git /tmp/x264 && break
            echo "x264 clone attempt ${attempt} failed; retrying…"; sleep 5
          done
          X264_SHA="$(git -C /tmp/x264 rev-parse HEAD)"
          echo "x264 source: https://code.videolan.org/videolan/x264.git ref=${X264_REF} sha=${X264_SHA}"
          printf 'libx264 corresponding source\nrepo: https://code.videolan.org/videolan/x264.git\nref:  %s\nsha:  %s\nbuilt: static (--enable-static --enable-pic --disable-cli)\n' \
            "${X264_REF}" "${X264_SHA}" > "$HOME/x264-SOURCES.txt"
          echo "X264_SOURCES_FILE=$HOME/x264-SOURCES.txt" >> "$GITHUB_ENV"
          ( cd /tmp/x264 \
            && ./configure --prefix="${X264_PREFIX}" --enable-static --enable-pic --disable-cli \
            && make -j"$(nproc)" \
            && make install )
          # Prepend the static x264 prefix so build.rs's pkg-config probe finds
          # this x264.pc (with a real -L the static-archive detector can see)
          # ahead of any system copy. Persists to the "Build release binary"
          # step via $GITHUB_ENV.
          echo "PKG_CONFIG_PATH=${X264_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          # nv-codec-headers is not packaged for Ubuntu 24.04 (noble); install
          # from source. Header-only package — `make install` drops headers +
          # ffnvcodec.pc into $PREFIX. Pinned to a tag compatible with vendored
          # FFmpeg n7.1.3 (needs nv-codec-headers >= 11.1).
          NV_CODEC_HEADERS_VERSION="n12.2.72.0"
          git clone --depth 1 --branch "${NV_CODEC_HEADERS_VERSION}" \
            https://github.com/FFmpeg/nv-codec-headers.git /tmp/nv-codec-headers
          sudo make -C /tmp/nv-codec-headers PREFIX=/usr/local install

      - name: Install QSV build dependencies (x86_64 only)
        if: matrix.variant == 'full' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          # libvpl-dev ships the Intel oneVPL headers + the `vpl` pkg-config
          # module. Available in Ubuntu 24.04 (noble) main. Intel QuickSync
          # is x86_64-only in practice — the aarch64 build skips this step
          # and uses the explicit cross-arch feature list above.
          sudo apt-get install -y libvpl-dev

      - name: Install VAAPI build dependencies
        if: matrix.variant == 'full'
        run: |
          # libva-dev ships libva + libva-drm pkg-config modules and
          # headers. Available on both x86_64 and aarch64 in Ubuntu
          # 24.04 main. Royalty-free at every layer (libva is MIT).
          # Runtime driver (Mesa radeonsi for AMD, iHD for Intel) is
          # provided by the host, not bundled.
          # libdrm-dev is also required: libffmpeg-video-sys/build.rs
          # pkg-config-probes libdrm to wire FFmpeg's `--enable-libdrm`
          # so the VAAPI hwcontext can export DMA-BUF descriptors for
          # the edge's zero-copy KMS scanout (`vaapi_map_to_drm`).
          sudo apt-get install -y libva-dev libdrm-dev

      - name: Install RKMPP (Rockchip MPP) build dependency
        if: matrix.rkmpp == 'true'
        run: |
          # video-encoder-rkmpp needs pkg-config `rockchip_mpp >= 1.3.8`
          # (ships rockchip_mpp.pc + librockchip_mpp.so) at BUILD time —
          # libffmpeg-video-sys/build.rs hard-probes it and FFmpeg's
          # `configure --enable-rkmpp` requires it. NONE of this touches the
          # VPU: it is a userspace header+symbol/link check, so the encoder
          # builds fine on this non-Rockchip Ampere/Neoverse runner and only
          # opens /dev/mpp_service at RUNTIME on a real RK3568/RK3588.
          # libdrm-dev is already installed by the VAAPI step above (rkmpp
          # also mandates --enable-libdrm).
          #
          # rockchip_mpp is NOT in stock Ubuntu, so add the maintained
          # `ppa:jjriek/rockchip-multimedia` (Joshua Riek's ubuntu-rockchip),
          # which publishes librockchip-mpp-dev for noble arm64 at MPP 1.5.0
          # (>= 1.3.8). It links DYNAMICALLY; the shipped binary carries a
          # runtime DT_NEEDED on librockchip_mpp.so.1, satisfied by the
          # Rockchip BSP userspace on the deployed board.
          #
          # NOTE (needs a real release run to confirm): if this PPA is ever
          # unavailable for the runner's series/arch, the fallback is an in-job
          # cmake build of github.com/rockchip-linux/mpp pinned to a commit
          # (it vendors its own uapi and builds without the VPU), installed to
          # a prefix on PKG_CONFIG_PATH — same idiom as the x264 source build.
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:jjriek/rockchip-multimedia
          sudo apt-get update
          sudo apt-get install -y librockchip-mpp-dev
          # Record the MPP provenance for the LGPL corresponding-source note
          # (mirrors x264-SOURCES.txt); MPP is LGPLv2.1+, dynamic-linked.
          MPP_VER="$(pkg-config --modversion rockchip_mpp 2>/dev/null || echo unknown)"
          printf 'librockchip_mpp corresponding source (LGPLv2.1+, dynamically linked)\nsource: https://github.com/rockchip-linux/mpp\npackaged-by: ppa:jjriek/rockchip-multimedia (librockchip-mpp-dev)\nversion: %s\n' \
            "${MPP_VER}" > "$HOME/rockchip-mpp-SOURCES.txt"
          echo "MPP_SOURCES_FILE=$HOME/rockchip-mpp-SOURCES.txt" >> "$GITHUB_ENV"
          echo "rockchip_mpp version: ${MPP_VER}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bilbycast-edge/target
          # Keyed on artifact_suffix, not target+variant: the two aarch64
          # entries (aarch64-linux-full and aarch64-linux-rockchip) share the
          # same target AND variant, so a target+variant key would collide their
          # target/ dirs even though their feature sets (and thus artefacts)
          # differ. artifact_suffix is unique per matrix entry.
          key: ${{ matrix.artifact_suffix }}-cargo-edge-${{ hashFiles('bilbycast-edge/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.artifact_suffix }}-cargo-edge-

      - name: Build release binary
        working-directory: bilbycast-edge
        run: |
          if [ -n "${{ matrix.cargo_features }}" ]; then
            cargo build --release --target ${{ matrix.target }} --features "${{ matrix.cargo_features }}"
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Verify binary
        run: |
          BINARY="bilbycast-edge/target/${{ matrix.target }}/release/bilbycast-edge"
          echo "=== File type ==="
          file "${BINARY}"
          echo "=== Dynamic dependencies ==="
          ldd "${BINARY}" 2>&1 || true

          echo "=== Checking libx264/libx265 are STATICALLY linked (no runtime .so) ==="
          # The GPL encoders are static-linked so the artefact has no runtime
          # dependency on libx264.so.<build> / libx265.so.<build> — those SONAMEs
          # bump every distro release (24.04 .164/.199 vs 26.04 .165/.215,
          # ABI-incompatible) and a dynamically-linked binary breaks on a host
          # shipping a different build. A NEEDED entry here is a regression
          # (e.g. build.rs fell back to a dynamic link because no static .a was
          # on the path — check the $HOME/x264-static prefix + libx265-dev).
          if ldd "${BINARY}" | grep -qE 'libx264|libx265'; then
            echo "ERROR: binary dynamically links libx264/libx265 — expected a static link:"
            ldd "${BINARY}" | grep -E 'libx264|libx265' || true
            exit 1
          fi
          echo "OK: libx264/libx265 statically linked (no libx264.so/libx265.so NEEDED)"

          echo "=== Positive check: x264/x265 encoders actually baked in ==="
          # The inverted ldd gate proves the encoders aren't DYNAMIC; this
          # proves they're actually PRESENT (statically linked) — catches a
          # hypothetical build that compiled the feature but pulled neither
          # archive. The release binary is not stripped, so `nm` sees the
          # static text symbols (x264_encoder_open_NNN / x265_encoder_open_NNN).
          if ! nm "${BINARY}" 2>/dev/null | grep -qE ' [Tt] x264_encoder_open'; then
            echo "ERROR: x264 encoder symbol not found in binary (static link missing?)"
            exit 1
          fi
          if ! nm "${BINARY}" 2>/dev/null | grep -qE ' [Tt] x265_encoder_open'; then
            echo "ERROR: x265 encoder symbol not found in binary (static link missing?)"
            exit 1
          fi
          echo "OK: x264 + x265 encoder symbols defined in the binary (statically linked)"

          echo "=== Checking QSV (x86_64 only) ==="
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            if ! ldd "${BINARY}" | grep -qE 'libvpl'; then
              echo "ERROR: x86_64 binary is missing libvpl (QSV) linkage"
              exit 1
            fi
            echo "OK: links libvpl (QSV)"
          else
            if ldd "${BINARY}" | grep -qE 'libvpl'; then
              echo "ERROR: aarch64 binary unexpectedly links libvpl"
              exit 1
            fi
            echo "OK: aarch64 has no libvpl linkage (QSV is x86_64-only)"
          fi

          echo "=== Checking VAAPI ==="
          if [ "${{ matrix.rkmpp }}" = "true" ]; then
            # The Rockchip variant deliberately drops VAAPI (no VAAPI-capable
            # GPU on RK3568/RK3588 — Rockchip uses MPP/RGA), which also sheds
            # the libva.so runtime NEEDED that a minimal RK3588 BSP rootfs
            # usually lacks. Assert it is genuinely absent.
            if ldd "${BINARY}" | grep -qE 'libva\.|libva-drm\.'; then
              echo "ERROR: rockchip binary unexpectedly links libva (VAAPI should be dropped)"
              ldd "${BINARY}" | grep -E 'libva' || true
              exit 1
            fi
            echo "OK: rockchip variant has no VAAPI linkage (expected)"
          else
            if ! ldd "${BINARY}" | grep -qE 'libva\.'; then
              echo "ERROR: binary is missing libva linkage (VAAPI)"
              exit 1
            fi
            if ! ldd "${BINARY}" | grep -qE 'libva-drm\.'; then
              echo "ERROR: binary is missing libva-drm linkage (VAAPI render-node backend)"
              exit 1
            fi
            echo "OK: links libva and libva-drm (VAAPI)"
          fi

          echo "=== Checking display-output linkage (libasound2) ==="
          if ! ldd "${BINARY}" | grep -qE 'libasound\.'; then
            echo "ERROR: binary is missing libasound linkage (display feature)"
            exit 1
          fi
          echo "OK: display feature linked (libasound)"

          echo "=== Checking SDI (DeckLink) ==="
          # Negative: libDeckLinkAPI.so must stay dlopen-only. The SDK's
          # DeckLinkAPIDispatch.cpp resolves it at runtime; a DT_NEEDED entry
          # here would mean the link model changed and the artefact would refuse
          # to start on every host without Desktop Video installed — i.e. most
          # of them. That is the whole autodetect story, so it is worth a gate.
          if ldd "${BINARY}" | grep -qE 'libDeckLinkAPI'; then
            echo "ERROR: binary has a runtime dependency on libDeckLinkAPI — expected dlopen only:"
            ldd "${BINARY}" | grep -E 'libDeckLinkAPI' || true
            exit 1
          fi
          # Positive: the shim is actually baked in. Same reasoning as the
          # x264/x265 symbol check — the inverted ldd gate above passes just as
          # happily on a binary built without the feature at all. The release
          # binary is not stripped, so the shim's C-ABI symbols are visible.
          if ! nm "${BINARY}" 2>/dev/null | grep -qE ' [Tt] dl_read_frame'; then
            echo "ERROR: DeckLink shim symbol not found — sdi-decklink did not compile in."
            echo "  Every full artefact must ship SDI; check the cargo_features list and"
            echo "  the Materialise DeckLink SDK headers step."
            exit 1
          fi
          echo "OK: SDI compiled in (dl_read_frame present), libDeckLinkAPI dlopen-only"

          echo "=== MXL ==="
          # MXL uses dlopen (libloading) at runtime — no link-time dep.
          # The `mxl-not-built` feature skips the cmake C++ build; the
          # boot probe discovers the system-installed libmxl.so and gates
          # the mxl-* capability bits accordingly.
          echo "OK: MXL runtime-only (dlopen), no link-time check"

          echo "=== Checking RKMPP (Rockchip) ==="
          if [ "${{ matrix.rkmpp }}" = "true" ]; then
            # rkmpp is the ONE dynamic media dep in this variant: FFmpeg's
            # h264_rkmpp / hevc_rkmpp link librockchip_mpp.so, so a NEEDED entry
            # here is EXPECTED and correct — the OPPOSITE polarity of the
            # static x264/x265 gate above. Its presence also proves FFmpeg was
            # built with --enable-rkmpp; nothing else pulls librockchip_mpp.
            # At runtime the deployed RK3568/RK3588 board provides the
            # BSP's librockchip_mpp.so.1 + /dev/mpp_service.
            if ! ldd "${BINARY}" | grep -qE 'librockchip_mpp'; then
              echo "ERROR: rockchip binary is missing librockchip_mpp linkage — rkmpp did not compile in."
              echo "  Check the 'Install RKMPP build dependency' step and the cargo_features list."
              exit 1
            fi
            # Positive symbol check — FFmpeg (and its rkmpp AVCodec descriptors)
            # is statically linked, so nm sees the encoder symbol; the release
            # binary is not stripped (same assumption as the x264/x265 check).
            if ! nm "${BINARY}" 2>/dev/null | grep -qiE 'rkmpp'; then
              echo "ERROR: no rkmpp symbol found in binary (encoder not wired in?)"
              exit 1
            fi
            echo "OK: RKMPP compiled in (h264_rkmpp/hevc_rkmpp), librockchip_mpp dynamically linked (expected)"
          else
            # librockchip_mpp must never leak into the x86_64 or generic
            # aarch64-full artefacts — those run on hosts without the Rockchip
            # BSP and a NEEDED entry would make them refuse to start.
            if ldd "${BINARY}" | grep -qE 'librockchip_mpp'; then
              echo "ERROR: non-rockchip binary unexpectedly links librockchip_mpp"
              exit 1
            fi
            echo "OK: no RKMPP linkage (expected on non-rockchip variants)"
          fi

      - name: Package tarball
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          BINARY="bilbycast-edge/target/${{ matrix.target }}/release/bilbycast-edge"
          # Staging directory keeps the version so the unpacked folder is
          # self-identifying (`bilbycast-edge-0.36.1-x86_64-linux-full/`).
          STAGE="bilbycast-edge-${VERSION}-${{ matrix.artifact_suffix }}"
          mkdir -p "${STAGE}"
          cp "${BINARY}" "${STAGE}/bilbycast-edge"
          chmod +x "${STAGE}/bilbycast-edge"

          # Copy the licence + bundled-library manifest the variant needs.
          cp bilbycast-edge/LICENSE            "${STAGE}/LICENSE"
          cp bilbycast-edge/LICENSE.commercial "${STAGE}/LICENSE.commercial"
          cp bilbycast-edge/README.md          "${STAGE}/README.md"
          cp bilbycast-edge/NOTICE.full "${STAGE}/NOTICE"
          cp bilbycast-edge/COPYING.GPL "${STAGE}/COPYING.GPL"

          # Record the exact statically-linked libx264 source revision so the
          # GPL §3 corresponding-source obligation is satisfiable per-build
          # (libx264 is built from source on the runner; see the x264 step).
          if [ -n "${X264_SOURCES_FILE:-}" ] && [ -f "${X264_SOURCES_FILE}" ]; then
            cp "${X264_SOURCES_FILE}" "${STAGE}/SOURCES-x264.txt"
          fi

          # Record the librockchip_mpp provenance for the LGPL corresponding-
          # source note on the Rockchip artefact (dynamically linked, LGPLv2.1+).
          if [ -n "${MPP_SOURCES_FILE:-}" ] && [ -f "${MPP_SOURCES_FILE}" ]; then
            cp "${MPP_SOURCES_FILE}" "${STAGE}/SOURCES-rockchip-mpp.txt"
          fi

          # Fill in `{VER}` and `<org>` placeholders in the NOTICE so the
          # shipped file points at the actual tag + repo.
          sed -i \
            -e "s|{VER}|${VERSION}|g" \
            -e "s|<org>|${GITHUB_REPOSITORY_OWNER}|g" \
            "${STAGE}/NOTICE"

          if [ -d bilbycast-edge/config_examples ]; then
            cp -r bilbycast-edge/config_examples "${STAGE}/config_examples"
          fi

          # Bundle the operator install bundle inside the tarball so a
          # node that was bootstrapped from the curl-pipe-bash flow can
          # locate the systemd unit + scripts without going back to the
          # internet.
          if [ -d bilbycast-edge/packaging ]; then
            cp -r bilbycast-edge/packaging "${STAGE}/packaging"
          fi

          # Tarball name is *versionless* so /releases/latest/download/<asset>
          # always resolves to the most recent release — matches the manager
          # and relay workflows.
          TARBALL="bilbycast-edge-${{ matrix.artifact_suffix }}.tar.gz"
          tar czf "${TARBALL}" "${STAGE}"
          sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          echo "Packaged ${TARBALL} ($(du -h ${TARBALL} | cut -f1))"
          ls -l "${TARBALL}" "${TARBALL}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bilbycast-edge-${{ matrix.artifact_suffix }}
          path: |
            bilbycast-edge-${{ matrix.artifact_suffix }}.tar.gz
            bilbycast-edge-${{ matrix.artifact_suffix }}.tar.gz.sha256
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          path: bilbycast-edge

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      # ── Build canonical manifest.json for the upgrade pipeline ──
      # The manifest binds (version, channel, sequence) to the just-built
      # `(arch, variant) → url + sha256` table. Edges fetch this manifest +
      # its Sigstore bundle on `upgrade_binary` and verify it before
      # downloading any tarball. See `bilbycast-edge/src/upgrade/manifest.rs`
      # for the schema and `scripts/build-manifest.sh` for the canonical-JSON
      # builder.
      - name: Build manifest.json
        env:
          RELEASE_REPO: ${{ github.repository }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # Sequence: monotonic per device_type. We use the GitHub Actions
          # `run_number` because it's monotonic across the workflow's
          # lifetime and re-runs share an attempt counter rather than
          # bumping the run_number. Edges enforce
          # `manifest.sequence > state.last_sequence` so a replay attempt
          # with a stale signed manifest is rejected.
          SEQUENCE="${{ github.run_number }}"
          chmod +x bilbycast-edge/scripts/build-manifest.sh
          bilbycast-edge/scripts/build-manifest.sh \
              "${VERSION}" "stable" "${SEQUENCE}" "artifacts" "edge" \
              > artifacts/manifest.json
          echo "── manifest.json ──"
          cat artifacts/manifest.json
          echo

      # Pinned manual install instead of sigstore/cosign-installer@v3: that
      # action's bootstrap download has no retry, so a transient GitHub CDN
      # hiccup (curl exit 56 — "failure receiving network data") failed a
      # relay release job while edge/manager passed the identical step the
      # same second. curl --retry-all-errors makes the download resilient and
      # the pinned SHA-256 gives a strong integrity check. The release job is
      # x86_64-only (runs-on: ubuntu-24.04), so amd64 is the only asset needed.
      - name: Install cosign
        run: |
          COSIGN_VERSION="v2.4.1"
          COSIGN_SHA256="8b24b946dd5809c6bd93de08033bcf6bc0ed7d336b7785787c080f574b89249b"
          curl -fsSL --retry 6 --retry-all-errors --retry-delay 5 \
            -o cosign \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          echo "${COSIGN_SHA256}  cosign" | sha256sum -c -
          sudo install -m 0755 cosign /usr/local/bin/cosign
          rm -f cosign
          cosign version

      # Sign the manifest with Sigstore keyless. `cosign sign-blob`
      # requests a short-lived OIDC token from GitHub Actions, hands it
      # to Sigstore Fulcio for a 10-minute X.509 cert, generates an
      # ephemeral keypair, signs the manifest bytes, uploads the
      # signing event to Rekor, and emits the bundle. Edges verify the
      # bundle against the compiled-in `ALLOWED_SIGNERS` allowlist.
      - name: Sign manifest (Sigstore keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd artifacts
          cosign sign-blob --yes \
              --bundle manifest.sig.bundle \
              manifest.json
          echo "── manifest.sig.bundle (head) ──"
          head -c 512 manifest.sig.bundle
          echo

      - name: Verify cosign signature locally (paranoid check)
        run: |
          cd artifacts
          # Round-trip the signature via cosign verify-blob using the
          # same identity allowlist the edge enforces. This catches any
          # mismatch between the workflow path and the allowlist BEFORE
          # we publish the release artefacts — better here than in
          # production rollback territory.
          cosign verify-blob \
              --bundle manifest.sig.bundle \
              --certificate-identity-regexp 'https://github\.com/Bilbycast/bilbycast-edge/\.github/workflows/nightly-release\.yml@refs/tags/v.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              manifest.json

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          VERSION="${{ needs.check-version.outputs.version }}"

          # Skip tag creation when the workflow was triggered by a tag
          # push (the tag already exists in that case).
          if ! git -C bilbycast-edge rev-parse "${TAG}" > /dev/null 2>&1; then
              git -C bilbycast-edge tag "${TAG}"
              git -C bilbycast-edge push origin "${TAG}"
          fi

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "bilbycast-edge v${VERSION}" \
            --notes "Release of bilbycast-edge version ${VERSION}.

          ## Binaries

          Asset filenames are versionless so \`https://github.com/Bilbycast/bilbycast-edge/releases/latest/download/<asset>\` always resolves to this release. The unpacked directory keeps the version (\`bilbycast-edge-${VERSION}-<arch>-linux-full/\`).

          Bundles every video codec backend the edge knows about — encoders **and** HW decoders for the local-display output. **Encoders**: libx264 + libx265 + NVENC + VAAPI, plus QSV (Intel oneVPL) on x86_64. **Display HW decode**: NVDEC + VAAPI-decode, plus QSV-decode on x86_64. NVENC + NVDEC activate automatically on hosts with an NVIDIA driver; QSV (encode + decode) on hosts with an Intel iGPU + media driver; VAAPI on hosts with a working VAAPI driver (Mesa radeonsi for AMD, iHD for Intel); x264 / x265 + libavcodec software decode handle everything else. The aarch64 build omits QSV (Intel iGPU is x86_64-only). This binary is an **AGPL-3.0-or-later combined work** that bundles GPL-2.0-or-later code — see \`NOTICE\` inside the tarball.

          - \`bilbycast-edge-x86_64-linux-full.tar.gz\` — Linux x86_64 (amd64) — encoders: x264 + x265 + NVENC + QSV + VAAPI; display HW decode: NVDEC + QSV + VAAPI
          - \`bilbycast-edge-aarch64-linux-full.tar.gz\` — Linux ARM64 (aarch64) — encoders: x264 + x265 + NVENC + VAAPI; display HW decode: NVDEC + VAAPI
          - \`bilbycast-edge-aarch64-linux-rockchip.tar.gz\` — Linux ARM64 **Rockchip RK3568/RK3588** (NanoPi R5S/R6S, Orange Pi 5, Radxa Rock 5B…) — adds the **RKMPP** hardware H.264/HEVC encoder (\`h264_rkmpp\` / \`hevc_rkmpp\`, 8-bit 4:2:0) on top of x264 + x265 CPU fallback; **no** NVENC/QSV/VAAPI (none exist on Rockchip). **Runtime prereqs:** a Rockchip **BSP kernel** exposing \`/dev/mpp_service\` plus the BSP's \`librockchip_mpp.so\` (this binary links it dynamically) and the running user in the \`video\` group. Edges compiled with rkmpp auto-select this artefact (upgrade variant \`rockchip\`). See \`docs/installation.md\` §ARM Rockchip.

          **MXL** (Media eXchange Layer) support is compiled in. MXL is a shared-memory IPC protocol — the edge discovers the system-installed \`libmxl.so\` at runtime via \`dlopen\` and advertises MXL capabilities only when the library is present. Install MXL system-wide so all MXL-speaking applications on the host share the same library.

          **SDI** (Blackmagic DeckLink capture + playout) is compiled in. Autodetected at runtime exactly like NVENC: the edge \`dlopen\`s \`libDeckLinkAPI.so\` at boot and enumerates cards, so a host without Blackmagic **Desktop Video** installed — or with no DeckLink card fitted — simply does not advertise the \`sdi-decklink\` capability, and the manager UI hides the SDI input / output types for that node. There is nothing to configure and no separate build to install: fit a card, install Desktop Video, restart the edge, and SDI appears.

          ### Runtime dependencies
          libx264 / libx265 are **statically linked** into this binary — no \`libx264\` / \`libx265\` runtime package is required, and the binary is not tied to a distro's ABI-versioned \`libx264.so.<build>\` / \`libx265.so.<build>\` SONAME (so it runs on Ubuntu 24.04, 26.04+, Debian, etc. without hunting for a matching \`libx264-NNN\` package). Install the remaining stable-SONAME runtime libraries before running: \`sudo apt install libva2 libva-drm2 libasound2t64\` (use \`libasound2\` on Ubuntu 22.04 / Debian 12). No extra packages needed for NVENC beyond the NVIDIA driver. **For QSV (x86_64 only)**: \`sudo apt install libvpl2 intel-media-va-driver-non-free\` (or \`intel-media-driver\`). **For VAAPI**: install a vendor driver — \`mesa-va-drivers\` for AMD or \`intel-media-va-driver-non-free\` for Intel — then add the running user to the \`render\` group so the edge can open \`/dev/dri/renderD*\`. (\`install-edge.sh\` installs these automatically.) **For SDI (DeckLink)**: install Blackmagic **Desktop Video** (kernel driver + \`libDeckLinkAPI.so\`) from https://www.blackmagicdesign.com/support/ — needed only on hosts with a DeckLink card. The binary carries no link-time dependency on it, so hosts without it run normally and just don't offer SDI.

          ## Verify checksums
          \`\`\`
          sha256sum -c *.sha256
          \`\`\`

          ## Licensing
          bilbycast-edge is dual-licensed: AGPL-3.0-or-later for open-source use, commercial licence from Softside Tech Pty Ltd for OEM / SaaS / closed-source integration. See \`LICENSE\`, \`LICENSE.commercial\`, and the \`NOTICE\` file inside each tarball.

          **Commercial-licence customers**: the Softside commercial licence covers bilbycast source only — it does not relicense libx264 / libx265, which remain GPL-2.0-or-later inside the binary. To avoid GPL copyleft entirely, build from source with \`video-encoder-nvenc\` only. See \`LICENSE.commercial\` for the scope statement.

          **Patent notice**: H.264 / H.265 patent licensing (MPEG-LA, Access Advance, Velos Media) is separate from software copyright and is the operator's responsibility in commercial deployments. See \`NOTICE\` in the tarball.

          ## Remote upgrade

          This release is signed for keyless verification by the edge's auto-upgrade pipeline. Operators using the manager UI's \`Upgrade\` button consume \`manifest.json\` + \`manifest.sig.bundle\` automatically. To verify a release manually:
          \`\`\`
          cosign verify-blob \\\\
              --bundle manifest.sig.bundle \\\\
              --certificate-identity-regexp 'https://github.com/Bilbycast/bilbycast-edge/.github/workflows/nightly-release.yml@refs/tags/v.*' \\\\
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \\\\
              manifest.json
          \`\`\`
          See \`bilbycast-edge/docs/upgrade.md\` for the full trust model." \
            artifacts/bilbycast-edge-x86_64-linux-full.tar.gz \
            artifacts/bilbycast-edge-x86_64-linux-full.tar.gz.sha256 \
            artifacts/bilbycast-edge-aarch64-linux-full.tar.gz \
            artifacts/bilbycast-edge-aarch64-linux-full.tar.gz.sha256 \
            artifacts/bilbycast-edge-aarch64-linux-rockchip.tar.gz \
            artifacts/bilbycast-edge-aarch64-linux-rockchip.tar.gz.sha256 \
            artifacts/manifest.json \
            artifacts/manifest.sig.bundle \
            bilbycast-edge/packaging/install-edge.sh \
            bilbycast-edge/packaging/uninstall-edge.sh \
            bilbycast-edge/packaging/bilbycast-edge.service

      - name: Prune old releases (keep latest 3)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Sort by publishedAt (release publication timestamp), not
          # createdAt (the underlying tag-commit date) — the latter is
          # unstable when multiple releases share the same target
          # commit, which can happen on cross-repo publishes. publishedAt
          # is monotonic per `gh release create` call.
          gh release list --repo "${{ github.repository }}" --limit 100 --json tagName,publishedAt \
            --jq 'sort_by(.publishedAt) | reverse | .[3:] | .[].tagName' \
            | while read -r OLD_TAG; do
                [ -z "$OLD_TAG" ] && continue
                echo "Deleting old release ${OLD_TAG}"
                gh release delete "${OLD_TAG}" --repo "${{ github.repository }}" --cleanup-tag --yes
              done
