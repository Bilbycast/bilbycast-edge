name: Nightly Release

on:
  schedule:
    # 3:00 AM AEST (UTC+10) = 17:00 UTC previous day
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release found for ${TAG}. Will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact_suffix: x86_64-linux
            openssl_target: linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact_suffix: aarch64-linux
            openssl_target: linux-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout bilbycast-libsrt-rs (path dependency)
        uses: actions/checkout@v4
        with:
          repository: Bilbycast/bilbycast-libsrt-rs
          path: bilbycast-libsrt-rs
          submodules: recursive

      - name: Checkout bilbycast-edge
        uses: actions/checkout@v4
        with:
          path: bilbycast-edge

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev cmake clang pkg-config

      - name: Build static OpenSSL for musl
        run: |
          OPENSSL_VERSION="3.4.1"
          curl -LO "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz"
          tar xzf "openssl-${OPENSSL_VERSION}.tar.gz"
          cd "openssl-${OPENSSL_VERSION}"
          CC=musl-gcc ./Configure \
            --prefix=/usr/local/musl \
            --openssldir=/usr/local/musl/ssl \
            ${{ matrix.openssl_target }} \
            no-shared no-async no-engine
          make -j$(nproc)
          sudo make install_sw

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bilbycast-edge/target
          key: ${{ matrix.target }}-cargo-edge-${{ hashFiles('bilbycast-edge/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-edge-

      - name: Build release binary
        working-directory: bilbycast-edge
        env:
          OPENSSL_DIR: /usr/local/musl
          OPENSSL_STATIC: "1"
          OPENSSL_NO_PKG_CONFIG: "1"
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary is statically linked
        run: |
          BINARY="bilbycast-edge/target/${{ matrix.target }}/release/bilbycast-edge"
          echo "=== File type ==="
          file "${BINARY}"
          echo "=== Dynamic dependencies ==="
          # Static musl binaries should show "statically linked"
          ldd "${BINARY}" 2>&1 || true

      - name: Prepare artifact
        run: |
          BINARY="bilbycast-edge/target/${{ matrix.target }}/release/bilbycast-edge"
          ARTIFACT="bilbycast-edge-${{ matrix.artifact_suffix }}"
          cp "${BINARY}" "${ARTIFACT}"
          chmod +x "${ARTIFACT}"
          sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilbycast-edge-${{ matrix.artifact_suffix }}
          path: |
            bilbycast-edge-${{ matrix.artifact_suffix }}
            bilbycast-edge-${{ matrix.artifact_suffix }}.sha256
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          VERSION="${{ needs.check-version.outputs.version }}"

          git tag "${TAG}"
          git push origin "${TAG}"

          gh release create "${TAG}" \
            --title "bilbycast-edge v${VERSION}" \
            --notes "Release of bilbycast-edge version ${VERSION}.

          ## Binaries (static musl — no runtime dependencies)
          - \`bilbycast-edge-x86_64-linux\` — Linux x86_64 (amd64)
          - \`bilbycast-edge-aarch64-linux\` — Linux ARM64 (aarch64)

          Verify checksums:
          \`\`\`
          sha256sum -c bilbycast-edge-x86_64-linux.sha256
          sha256sum -c bilbycast-edge-aarch64-linux.sha256
          \`\`\`" \
            artifacts/bilbycast-edge-x86_64-linux \
            artifacts/bilbycast-edge-x86_64-linux.sha256 \
            artifacts/bilbycast-edge-aarch64-linux \
            artifacts/bilbycast-edge-aarch64-linux.sha256
