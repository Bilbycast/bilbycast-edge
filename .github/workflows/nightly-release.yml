name: Release

# Two triggers, both converging on the same build + sign + publish job:
#   - `workflow_dispatch` (manual button in the GitHub Actions UI)
#   - `push.tags: v*` (used by the monorepo-root `release-all.sh`
#     orchestrator — this is the canonical release path)
#
# The schedule trigger was removed: cosign-keyless signing requires the
# Fulcio cert subject to match `refs/tags/v*` (enforced by
# `src/upgrade/trust.rs::ALLOWED_SIGNERS` on every deployed edge), and a
# `schedule` run from `main` produces a `refs/heads/main` cert that fails
# verification. `release-all.sh` pushes the tag and lets the `push.tags`
# trigger fire the workflow under the correct ref.
#
# Filename `nightly-release.yml` is preserved on disk because it is
# hard-coded into the Sigstore identity allowlist
# (`src/upgrade/trust.rs::ALLOWED_SIGNERS`) and the `cosign verify-blob`
# regex below — renaming would lock every deployed edge out of accepting
# future signed manifests.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # Required for Sigstore keyless signing — Fulcio mints a short-lived
  # cert against the workflow run's OIDC identity.
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}, tag: ${TAG}"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release found for ${TAG}. Will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # Apple Silicon compile-check — validates that the codebase still
  # builds cleanly on `aarch64-apple-darwin` so dev-box compatibility
  # doesn't silently drift. Does NOT produce a release artefact (the
  # full notarisation / signing / .dmg packaging path is a planned
  # follow-up). Runs in parallel with the Linux release matrix.
  apple-silicon-check:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-14
    steps:
      - name: Checkout bilbycast-libsrt-rs (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-libsrt-rs
          path: bilbycast-libsrt-rs
          submodules: recursive
      - name: Checkout bilbycast-fdk-aac-rs (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-fdk-aac-rs
          path: bilbycast-fdk-aac-rs
          submodules: recursive
      - name: Checkout bilbycast-ffmpeg-video-rs (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-ffmpeg-video-rs
          path: bilbycast-ffmpeg-video-rs
          submodules: recursive
          fetch-depth: 0
      - name: Checkout bilbycast-rist (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-rist
          path: bilbycast-rist
          submodules: recursive
      - name: Checkout bilbycast-bonding (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-bonding
          path: bilbycast-bonding
      - name: Checkout bilbycast-edge
        uses: actions/checkout@v5
        with:
          path: bilbycast-edge
      - name: Install build dependencies (Homebrew)
        run: |
          # cmake / nasm for the vendored libopus + FFmpeg builds.
          # Xcode CLT ships clang + make. No GPL deps installed here —
          # the AGPL-only feature set covers the Apple Silicon
          # compile-check. The `display` Cargo feature is Linux-only
          # (drm-rs / alsa) and is excluded.
          brew install cmake nasm pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bilbycast-edge
      - name: cargo check (AGPL feature set, no display, no GPL encoders)
        working-directory: bilbycast-edge
        run: |
          # No `display` (Linux-only KMS / ALSA), no GPL encoders. The
          # `video-thumbnail` feature gives us libavcodec + libopus +
          # MP2 / AC-3 / E-AC-3 + VideoToolbox probe, which is enough
          # to confirm the codebase compiles on Apple Silicon.
          cargo check --no-default-features \
            --features tls,fdk-aac,video-thumbnail,replay,webrtc \
            --target aarch64-apple-darwin

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # ─── default variant: no video encoders (AGPL-3.0-or-later only) ───
          # The local-display output (`display` Cargo feature) ships in
          # every Linux variant. `drm-rs` is a pure-Rust ioctl crate —
          # it talks to `/dev/dri/cardN` directly and does NOT link
          # libdrm. ALSA (libasound2) DOES link at build time; LGPL-
          # clean, no GPL implications. Connector enumeration walks
          # `/sys/class/drm` via std::fs, so libudev is not in the
          # link graph. Operators who don't need a confidence monitor
          # on the box simply don't configure a `display` output; the
          # runtime cost when unused is one cold KMS probe at startup
          # (returns empty on headless builders, no `"display"`
          # capability advertised, manager UI hides the option per-node).
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: x86_64-linux
            variant: default
            cargo_features: "display"
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: aarch64-linux
            variant: default
            cargo_features: "display"
          # ─── full variant: every video codec backend (AGPL + GPL bundle) ───
          # libx264 + libx265 + NVENC + NVDEC + VAAPI encoders/decoders —
          # plus QSV (encode + decode) on x86_64. aarch64 drops QSV
          # because Intel iGPU is x86_64-only, so it lists the cross-arch
          # features explicitly instead of the `video-encoders-full`
          # composite. VAAPI ships on both arches (Linux only; activates
          # at runtime on AMD Mesa radeonsi or Intel iHD hosts). `display`
          # is included on top of the codec bundle so the local-display
          # output spawner is compiled in.
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: x86_64-linux-full
            variant: full
            cargo_features: "video-encoders-full display"
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: aarch64-linux-full
            variant: full
            cargo_features: "video-encoder-x264 video-encoder-x265 video-encoder-nvenc video-encoder-vaapi display-nvdec display-vaapi display"
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout bilbycast-libsrt-rs (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-libsrt-rs
          path: bilbycast-libsrt-rs
          submodules: recursive

      - name: Checkout bilbycast-fdk-aac-rs (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-fdk-aac-rs
          path: bilbycast-fdk-aac-rs
          submodules: recursive

      - name: Checkout bilbycast-ffmpeg-video-rs (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-ffmpeg-video-rs
          path: bilbycast-ffmpeg-video-rs
          submodules: recursive
          fetch-depth: 0

      - name: Checkout bilbycast-rist (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-rist
          path: bilbycast-rist
          submodules: recursive

      - name: Checkout bilbycast-bonding (path dependency)
        uses: actions/checkout@v5
        with:
          repository: Bilbycast/bilbycast-bonding
          path: bilbycast-bonding

      - name: Checkout bilbycast-edge
        uses: actions/checkout@v5
        with:
          path: bilbycast-edge

      - name: Install common build dependencies
        run: |
          # `display` Cargo feature link-time dep: libasound2-dev
          # (alsa-sys `links = "alsa"`). `drm-rs` is pure-Rust ioctls
          # over /dev/dri — no libdrm-dev needed. Connector enumeration
          # walks `/sys/class/drm` via std::fs, so libudev-dev isn't
          # in the link graph either.
          sudo apt-get update
          sudo apt-get install -y cmake make clang libclang-dev pkg-config libssl-dev g++ \
            libasound2-dev nasm

      - name: Install video-encoder build dependencies (full variant only)
        if: matrix.variant == 'full'
        run: |
          # libnuma-dev is required because Ubuntu's x265.pc declares `-lnuma`
          # in Libs.private — FFmpeg configure's link-test for x265 fails with
          # `ld: cannot find -lnuma` without the -dev symlink.
          sudo apt-get install -y libx264-dev libx265-dev libnuma-dev
          # nv-codec-headers is not packaged for Ubuntu 24.04 (noble); install
          # from source. Header-only package — `make install` drops headers +
          # ffnvcodec.pc into $PREFIX. Pinned to a tag compatible with vendored
          # FFmpeg n7.1.3 (needs nv-codec-headers >= 11.1).
          NV_CODEC_HEADERS_VERSION="n12.2.72.0"
          git clone --depth 1 --branch "${NV_CODEC_HEADERS_VERSION}" \
            https://github.com/FFmpeg/nv-codec-headers.git /tmp/nv-codec-headers
          sudo make -C /tmp/nv-codec-headers PREFIX=/usr/local install

      - name: Install QSV build dependencies (x86_64-full only)
        if: matrix.variant == 'full' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          # libvpl-dev ships the Intel oneVPL headers + the `vpl` pkg-config
          # module. Available in Ubuntu 24.04 (noble) main. Intel QuickSync
          # is x86_64-only in practice — the aarch64 build skips this step
          # and uses the explicit cross-arch feature list above.
          sudo apt-get install -y libvpl-dev

      - name: Install VAAPI build dependencies (full variant only)
        if: matrix.variant == 'full'
        run: |
          # libva-dev ships libva + libva-drm pkg-config modules and
          # headers. Available on both x86_64 and aarch64 in Ubuntu
          # 24.04 main. Royalty-free at every layer (libva is MIT).
          # Runtime driver (Mesa radeonsi for AMD, iHD for Intel) is
          # provided by the host, not bundled.
          # libdrm-dev is also required: libffmpeg-video-sys/build.rs
          # pkg-config-probes libdrm to wire FFmpeg's `--enable-libdrm`
          # so the VAAPI hwcontext can export DMA-BUF descriptors for
          # the edge's zero-copy KMS scanout (`vaapi_map_to_drm`).
          sudo apt-get install -y libva-dev libdrm-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bilbycast-edge/target
          key: ${{ matrix.target }}-${{ matrix.variant }}-cargo-edge-${{ hashFiles('bilbycast-edge/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-${{ matrix.variant }}-cargo-edge-

      - name: Build release binary
        working-directory: bilbycast-edge
        run: |
          if [ -n "${{ matrix.cargo_features }}" ]; then
            cargo build --release --target ${{ matrix.target }} --features "${{ matrix.cargo_features }}"
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Verify binary
        run: |
          BINARY="bilbycast-edge/target/${{ matrix.target }}/release/bilbycast-edge"
          echo "=== File type ==="
          file "${BINARY}"
          echo "=== Dynamic dependencies ==="
          ldd "${BINARY}" 2>&1 || true
          echo "=== Checking for libx264/libx265 (variant: ${{ matrix.variant }}) ==="
          if [ "${{ matrix.variant }}" = "full" ]; then
            if ! ldd "${BINARY}" | grep -qE 'libx264|libx265'; then
              echo "ERROR: full variant binary is missing libx264 or libx265 linkage"
              exit 1
            fi
            echo "OK: full variant links libx264 and libx265"
            if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
              if ! ldd "${BINARY}" | grep -qE 'libvpl'; then
                echo "ERROR: x86_64-full binary is missing libvpl (QSV) linkage"
                exit 1
              fi
              echo "OK: x86_64-full variant links libvpl (QSV)"
            else
              if ldd "${BINARY}" | grep -qE 'libvpl'; then
                echo "ERROR: aarch64-full binary unexpectedly links libvpl"
                exit 1
              fi
              echo "OK: aarch64-full variant has no libvpl linkage (QSV is x86_64-only)"
            fi
            # VAAPI ships on both arches in -full. libva.so.2 + libva-drm.so.2
            # are runtime-link-required by FFmpeg's VAAPI codec wrappers.
            if ! ldd "${BINARY}" | grep -qE 'libva\.'; then
              echo "ERROR: full variant binary is missing libva linkage (VAAPI)"
              exit 1
            fi
            if ! ldd "${BINARY}" | grep -qE 'libva-drm\.'; then
              echo "ERROR: full variant binary is missing libva-drm linkage (VAAPI render-node backend)"
              exit 1
            fi
            echo "OK: full variant links libva and libva-drm (VAAPI)"
          else
            if ldd "${BINARY}" | grep -qE 'libx264|libx265'; then
              echo "ERROR: default variant binary unexpectedly links libx264/libx265"
              exit 1
            fi
            echo "OK: default variant has no libx264/libx265 linkage"
            if ldd "${BINARY}" | grep -qE 'libva\.|libva-drm\.'; then
              echo "ERROR: default variant binary unexpectedly links libva (VAAPI is full-only)"
              exit 1
            fi
            echo "OK: default variant has no libva linkage"
          fi
          echo "=== Checking for display-output linkage (libasound2) ==="
          # `display` is in every Linux variant — confirm libasound.so.2
          # is linked. `drm-rs` is pure-Rust ioctls over /dev/dri/cardN,
          # so libdrm.so.2 is intentionally NOT linked. Connector
          # enumeration walks `/sys/class/drm` via std::fs, so libudev
          # is not in the link graph either. Runtime behaviour on a
          # headless host is to enumerate empty and not advertise the
          # `"display"` capability — the linkage stays regardless so
          # a single binary works across both wall-mount and headless
          # deployments.
          if ! ldd "${BINARY}" | grep -qE 'libasound\.'; then
            echo "ERROR: Linux binary is missing libasound linkage (display feature)"
            exit 1
          fi
          echo "OK: display feature linked (libasound)"

      - name: Package tarball
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          BINARY="bilbycast-edge/target/${{ matrix.target }}/release/bilbycast-edge"
          # Staging directory keeps the version so the unpacked folder is
          # self-identifying (`bilbycast-edge-0.36.1-x86_64-linux-full/`).
          STAGE="bilbycast-edge-${VERSION}-${{ matrix.artifact_suffix }}"
          mkdir -p "${STAGE}"
          cp "${BINARY}" "${STAGE}/bilbycast-edge"
          chmod +x "${STAGE}/bilbycast-edge"

          # Copy the licence + bundled-library manifest the variant needs.
          cp bilbycast-edge/LICENSE            "${STAGE}/LICENSE"
          cp bilbycast-edge/LICENSE.commercial "${STAGE}/LICENSE.commercial"
          cp bilbycast-edge/README.md          "${STAGE}/README.md"
          if [ "${{ matrix.variant }}" = "full" ]; then
            cp bilbycast-edge/NOTICE.full "${STAGE}/NOTICE"
            cp bilbycast-edge/COPYING.GPL "${STAGE}/COPYING.GPL"
          else
            cp bilbycast-edge/NOTICE "${STAGE}/NOTICE"
          fi

          # Fill in `{VER}` and `<org>` placeholders in the NOTICE so the
          # shipped file points at the actual tag + repo.
          sed -i \
            -e "s|{VER}|${VERSION}|g" \
            -e "s|<org>|${GITHUB_REPOSITORY_OWNER}|g" \
            "${STAGE}/NOTICE"

          if [ -d bilbycast-edge/config_examples ]; then
            cp -r bilbycast-edge/config_examples "${STAGE}/config_examples"
          fi

          # Bundle the operator install bundle inside the tarball so a
          # node that was bootstrapped from the curl-pipe-bash flow can
          # locate the systemd unit + scripts without going back to the
          # internet.
          if [ -d bilbycast-edge/packaging ]; then
            cp -r bilbycast-edge/packaging "${STAGE}/packaging"
          fi

          # Tarball name is *versionless* so /releases/latest/download/<asset>
          # always resolves to the most recent release — matches the manager
          # and relay workflows.
          TARBALL="bilbycast-edge-${{ matrix.artifact_suffix }}.tar.gz"
          tar czf "${TARBALL}" "${STAGE}"
          sha256sum "${TARBALL}" > "${TARBALL}.sha256"
          echo "Packaged ${TARBALL} ($(du -h ${TARBALL} | cut -f1))"
          ls -l "${TARBALL}" "${TARBALL}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bilbycast-edge-${{ matrix.artifact_suffix }}
          path: |
            bilbycast-edge-${{ matrix.artifact_suffix }}.tar.gz
            bilbycast-edge-${{ matrix.artifact_suffix }}.tar.gz.sha256
          retention-days: 1

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          path: bilbycast-edge

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      # ── Build canonical manifest.json for the upgrade pipeline ──
      # The manifest binds (version, channel, sequence) to the just-built
      # `(arch, variant) → url + sha256` table. Edges fetch this manifest +
      # its Sigstore bundle on `upgrade_binary` and verify it before
      # downloading any tarball. See `bilbycast-edge/src/upgrade/manifest.rs`
      # for the schema and `scripts/build-manifest.sh` for the canonical-JSON
      # builder.
      - name: Build manifest.json
        env:
          RELEASE_REPO: ${{ github.repository }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # Sequence: monotonic per device_type. We use the GitHub Actions
          # `run_number` because it's monotonic across the workflow's
          # lifetime and re-runs share an attempt counter rather than
          # bumping the run_number. Edges enforce
          # `manifest.sequence > state.last_sequence` so a replay attempt
          # with a stale signed manifest is rejected.
          SEQUENCE="${{ github.run_number }}"
          chmod +x bilbycast-edge/scripts/build-manifest.sh
          bilbycast-edge/scripts/build-manifest.sh \
              "${VERSION}" "stable" "${SEQUENCE}" "artifacts" "edge" \
              > artifacts/manifest.json
          echo "── manifest.json ──"
          cat artifacts/manifest.json
          echo

      # Install cosign so we can keyless-sign the manifest. The action
      # is a thin shim — installs the cosign binary into PATH and pins
      # the version reproducibly.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      # Sign the manifest with Sigstore keyless. `cosign sign-blob`
      # requests a short-lived OIDC token from GitHub Actions, hands it
      # to Sigstore Fulcio for a 10-minute X.509 cert, generates an
      # ephemeral keypair, signs the manifest bytes, uploads the
      # signing event to Rekor, and emits the bundle. Edges verify the
      # bundle against the compiled-in `ALLOWED_SIGNERS` allowlist.
      - name: Sign manifest (Sigstore keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd artifacts
          cosign sign-blob --yes \
              --bundle manifest.sig.bundle \
              manifest.json
          echo "── manifest.sig.bundle (head) ──"
          head -c 512 manifest.sig.bundle
          echo

      - name: Verify cosign signature locally (paranoid check)
        run: |
          cd artifacts
          # Round-trip the signature via cosign verify-blob using the
          # same identity allowlist the edge enforces. This catches any
          # mismatch between the workflow path and the allowlist BEFORE
          # we publish the release artefacts — better here than in
          # production rollback territory.
          cosign verify-blob \
              --bundle manifest.sig.bundle \
              --certificate-identity-regexp 'https://github\.com/Bilbycast/bilbycast-edge/\.github/workflows/nightly-release\.yml@refs/tags/v.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              manifest.json

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          VERSION="${{ needs.check-version.outputs.version }}"

          # Skip tag creation when the workflow was triggered by a tag
          # push (the tag already exists in that case).
          if ! git -C bilbycast-edge rev-parse "${TAG}" > /dev/null 2>&1; then
              git -C bilbycast-edge tag "${TAG}"
              git -C bilbycast-edge push origin "${TAG}"
          fi

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "bilbycast-edge v${VERSION}" \
            --notes "Release of bilbycast-edge version ${VERSION}.

          ## Binaries

          Two variants per architecture — pick one based on your transcoding needs:

          Asset filenames are versionless so \`https://github.com/Bilbycast/bilbycast-edge/releases/latest/download/<asset>\` always resolves to this release. The unpacked directory keeps the version (\`bilbycast-edge-${VERSION}-<arch>-linux[-full]/\`).

          ### \`*-linux\` (default variant)
          No H.264 / H.265 software encoders bundled. AGPL-3.0-or-later binary.
          - \`bilbycast-edge-x86_64-linux.tar.gz\` — Linux x86_64 (amd64)
          - \`bilbycast-edge-aarch64-linux.tar.gz\` — Linux ARM64 (aarch64)

          ### \`*-linux-full\` (full variant)
          Bundles every video codec backend the edge knows about — encoders **and** the new HW decoders for the local-display output. **Encoders**: libx264 + libx265 + NVENC + VAAPI, plus QSV (Intel oneVPL) on x86_64. **Display HW decode**: NVDEC + VAAPI-decode, plus QSV-decode on x86_64. NVENC + NVDEC activate automatically on hosts with an NVIDIA driver; QSV (encode + decode) on hosts with an Intel iGPU + media driver; VAAPI on hosts with a working VAAPI driver (Mesa radeonsi for AMD, iHD for Intel); x264 / x265 + libavcodec software decode handle everything else. The aarch64 build omits QSV (Intel iGPU is x86_64-only). This binary is an **AGPL-3.0-or-later combined work** that bundles GPL-2.0-or-later code — see \`NOTICE\` inside the tarball.
          - \`bilbycast-edge-x86_64-linux-full.tar.gz\` — Linux x86_64 (amd64) — encoders: x264 + x265 + NVENC + QSV + VAAPI; display HW decode: NVDEC + QSV + VAAPI
          - \`bilbycast-edge-aarch64-linux-full.tar.gz\` — Linux ARM64 (aarch64) — encoders: x264 + x265 + NVENC + VAAPI; display HW decode: NVDEC + VAAPI

          Install \`libx264\`, \`libx265\`, and \`libva\` runtime packages before running the \`-full\` binary: \`sudo apt install libx264-dev libx265-dev libva2 libva-drm2\`. No extra packages needed for NVENC beyond the NVIDIA driver. **For QSV (x86_64 only)**: \`sudo apt install libvpl2 intel-media-va-driver-non-free\` (or \`intel-media-driver\`). **For VAAPI**: install a vendor driver — \`mesa-va-drivers\` for AMD or \`intel-media-va-driver-non-free\` for Intel — then add the running user to the \`render\` group so the edge can open \`/dev/dri/renderD*\`.

          ## Verify checksums
          \`\`\`
          sha256sum -c *.sha256
          \`\`\`

          ## Licensing
          bilbycast-edge is dual-licensed: AGPL-3.0-or-later for open-source use, commercial licence from Softside Tech Pty Ltd for OEM / SaaS / closed-source integration. See \`LICENSE\`, \`LICENSE.commercial\`, and the per-variant \`NOTICE\` file inside each tarball.

          **Commercial-licence customers using \`-full\`**: the Softside commercial licence covers bilbycast source only — it does not relicense libx264 / libx265, which remain GPL-2.0-or-later inside the \`-full\` binary. To avoid GPL copyleft entirely, use the default variant or build from source with \`video-encoder-nvenc\` only. See \`LICENSE.commercial\` for the scope statement.

