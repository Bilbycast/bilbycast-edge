# bilbycast-ptp-gm.conf — PTP grandmaster for testing bilbycast
#
# Used by ./bilbycast-ptp-gm.sh. The interface is selected by the script
# (-i <iface>) and the timestamping mode (HW vs SW) is selected at startup
# (HW preferred, falls back to SW with -S).
#
# Defaults to SMPTE ST 2059-2 broadcast profile timings on domain 127.
# Change `domainNumber` to 0 if you're testing a generic IEEE 1588 setup.

[global]
# --- BMCA / identity ---
# Free-running clock: no GPS, no upstream PTP, oscillator is the NIC PHC
# (when HW) or CLOCK_REALTIME (when SW, NTP-disciplined by chrony).
priority1                   128
priority2                   128
clockClass                  248
clockAccuracy               0xFE
offsetScaledLogVariance     0xFFFF
free_running                1
masterOnly                  1
twoStepFlag                 1

# --- SMPTE ST 2059-2 broadcast profile timings ---
domainNumber                127
logAnnounceInterval         0
logSyncInterval             -3
logMinDelayReqInterval      -3
announceReceiptTimeout      3

# --- Transport ---
network_transport           UDPv4
delay_mechanism             E2E

# --- Timestamping ---
tx_timestamp_timeout        50
hwts_filter                 full
socket_priority             4

# --- Logging ---
logging_level               6
use_syslog                  0
verbose                     1

# --- Management socket ---
# bilbycast-edge's engine::st2110::ptp reads /var/run/ptp4l (default).
# Do not override unless you also reconfigure the edge.
