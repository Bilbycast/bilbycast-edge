# bilbycast-edge kernel tuning — installed to /etc/sysctl.d/ by
# packaging/install-edge.sh. Applied at boot by systemd-sysctl; apply
# immediately with: sudo sysctl --system
#
# Receive-buffer ceiling (SO_RCVBUF clamp). The ST 2110-20
# uncompressed-video ingest requests a 64 MB socket buffer per leg —
# at 2160p50 (~8.3 Gbps) the distro default of 4 MB (8 MB effective)
# holds only ~8 ms of traffic, so a single scheduler hiccup or sender
# burst overflows it straight into kernel drops (visible as the skmem
# "d" counter in `ss -ulnm` and as partial-frame drops on the input).
# 64 MB buys ~66 ms of burst absorption. The edge logs a warning at
# input start whenever the kernel clamps its request below this.
# Harmless for non-2110 deployments: this is a ceiling, not an
# allocation — sockets only consume what they actually queue.
net.core.rmem_max = 67108864
