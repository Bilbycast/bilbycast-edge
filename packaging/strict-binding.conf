# bilbycast-edge — systemd drop-in for strict per-interface binding.
#
# Install at: /etc/systemd/system/bilbycast-edge.service.d/strict-binding.conf
# Then:       systemctl daemon-reload && systemctl restart bilbycast-edge
#
# Grants the edge process `CAP_NET_RAW` so `setsockopt(SO_BINDTODEVICE)`
# succeeds. Required only when operators want the *strict* mode of the
# `interface_binding` field (loose source-IP binding works without any
# capability and is the default).
#
# Strict mode is **opt-in by design**: `CAP_NET_RAW` also enables raw
# socket creation and packet forging. Plants that don't need
# kernel-enforced NIC pinning (i.e. don't run 2022-7 over diverse paths
# or multi-tenant NIC isolation) should leave the default zero-cap unit
# alone. See `docs/security.md` for the threat-model rationale.
#
# After installing this drop-in, the edge's startup probe succeeds and
# the manager UI exposes the "Strict (SO_BINDTODEVICE)" checkbox in the
# interface picker. Edges without the drop-in still expose the picker
# (loose source-IP binding) but the strict checkbox is hidden.

[Service]
AmbientCapabilities=CAP_NET_RAW
CapabilityBoundingSet=CAP_NET_RAW
