[package]
name = "bilbycast-edge"
version = "0.1.0"
edition = "2024"
description = "RTP/SMPTE 2022-2 over SRT transport bridge with 2022-7 hitless redundancy"

[dependencies]
# Async runtime
tokio = { version = "1.50.0", features = ["full"] }
tokio-util = "0.7.18"

# HTTP framework
axum = { version = "0.8.8", features = ["ws"] }
tower-http = { version = "0.6.8", features = ["cors", "trace"] }

# Serialization
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"

# Logging
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

# CLI
clap = { version = "4.6.0", features = ["derive"] }

# Time
chrono = "0.4.44"

# Concurrency
dashmap = "6.1.0"

# Byte buffers
bytes = "1.11.1"

# Enum utilities
strum = { version = "0.28.0", features = ["derive"] }
strum_macros = "0.28.0"

# Socket config
socket2 = "0.6.3"

# Random
rand = "0.10.0"

# Error handling
anyhow = "1.0.102"

# UUID for flow IDs
uuid = { version = "1.22.0", features = ["v4", "serde"] }

# SRT native (pure Rust)
srt-transport = { path = "../bilbycast-srt/srt-transport" }
srt-protocol = { path = "../bilbycast-srt/srt-protocol" }

[dev-dependencies]
tempfile = "3.27.0"
