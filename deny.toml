[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
    # rustls-pemfile 2.2.0 is the final release; the crate was archived in
    # August 2025 and its code lives on inside rustls-pki-types >= 1.9.0 via
    # the PemObject trait. Not a vulnerability — no safe upgrade exists.
    # TODO: migrate tunnel/quic.rs and bilbycast-bonding/bonding-transport
    # off rustls-pemfile onto rustls_pki_types::pem::PemObject, then drop
    # this ignore.
    "RUSTSEC-2025-0134",
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    # bilbycast itself
    "AGPL-3.0-or-later",
    # GPL deps only pulled in by opt-in video-encoder-x264 / x265 features
    "GPL-2.0-or-later",
    "GPL-3.0-or-later",
    # FFmpeg wrappers
    "LGPL-2.1-or-later",
    "LGPL-3.0-or-later",
    # Mozilla's webpki-roots / webpki-root-certs publish the CA bundle
    # under CDLA-Permissive-2.0 — OSI-compatible permissive terms for
    # bundled trust-store data, pulled in transitively by quinn + reqwest.
    "CDLA-Permissive-2.0",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
# Intra-workspace path deps (../bilbycast-fdk-aac-rs/aac-audio, etc.)
# don't declare versions — cargo-deny flags these as wildcards. The
# built-in `allow-wildcard-paths` escape hatch only activates for crates
# with `publish = false`, and none of our sibling workspace crates carry
# that field. These crates are never published to crates.io (path deps
# would prevent it anyway), so the supply-chain risk that the wildcards
# rule is meant to catch doesn't apply here. Downgrade to "warn" so
# wildcard deps from real crates.io sources still surface in logs
# without failing the build.
wildcards = "warn"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
