[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = [
    # rustls-pemfile 2.2.0 is the final release; the crate was archived in
    # August 2025 and its code lives on inside rustls-pki-types >= 1.9.0 via
    # the PemObject trait. Not a vulnerability — no safe upgrade exists.
    # TODO: migrate tunnel/quic.rs and bilbycast-bonding/bonding-transport
    # off rustls-pemfile onto rustls_pki_types::pem::PemObject, then drop
    # this ignore.
    "RUSTSEC-2025-0134",
    # rsa 0.9.x — Marvin Attack timing sidechannel on private-key
    # operations. Pulled in transitively by sigstore 0.12 (used by the
    # remote-upgrade pipeline's cosign verify-blob path). The edge only
    # *verifies* signatures, never decrypts or signs with RSA — the
    # exploitable scenario is "attacker observes timing of repeated RSA
    # decryptions over the network", which does not apply to one-shot
    # signature verification with no private key on this side. The
    # RustCrypto team is migrating to a constant-time implementation;
    # drop this ignore once a patched rsa version ships.
    # https://github.com/RustCrypto/RSA/issues/19
    "RUSTSEC-2023-0071",
]

[licenses]
confidence-threshold = 0.8
# Conditional entries (GPL-*, LGPL-*, Unicode-DFS-2016) cover opt-in
# features that aren't always in the dep graph — silence the false-
# positive `license-not-encountered` warning when a default `cargo deny`
# run doesn't pull them in.
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    # bilbycast itself
    "AGPL-3.0-or-later",
    # GPL deps only pulled in by opt-in video-encoder-x264 / x265 features
    "GPL-2.0-or-later",
    "GPL-3.0-or-later",
    # FFmpeg wrappers
    "LGPL-2.1-or-later",
    "LGPL-3.0-or-later",
    # Mozilla's webpki-roots / webpki-root-certs publish the CA bundle
    # under CDLA-Permissive-2.0 — OSI-compatible permissive terms for
    # bundled trust-store data, pulled in transitively by quinn + reqwest.
    "CDLA-Permissive-2.0",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# sigstore-protobuf-specs-derive ships `license-file = "LICENSE"` rather
# than an SPDX expression in its Cargo.toml. The bundled LICENSE text is
# Apache-2.0 verbatim (sigstore-org convention) — clarify so cargo-deny
# doesn't flag it as missing a license field.
# NOTE: the `hash` is FNV-1a 32-bit of the LICENSE file contents. If the
# upstream crate ever republishes with a touched LICENSE (newline, header)
# the hash drifts; cargo-deny then emits an `unmatched-license-file` warning
# whose body carries the new hash — copy it back here.
[[licenses.clarify]]
name = "sigstore-protobuf-specs-derive"
expression = "Apache-2.0"
license-files = [{ path = "LICENSE", hash = 0x0e0c7758 }]

[bans]
multiple-versions = "warn"
# Intra-workspace path deps (../bilbycast-fdk-aac-rs/aac-audio, etc.)
# don't declare versions — cargo-deny flags these as wildcards. All
# sibling workspace crates AND bilbycast-edge itself carry
# `publish = false`, so `allow-wildcard-paths` activates and silences
# the false positive. Real crates.io wildcard deps still surface as
# warnings.
wildcards = "warn"
allow-wildcard-paths = true
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
